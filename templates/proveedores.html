<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proveedores — Tlapalería El Mirador</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; }

    /* HEADER UNIFICADO */
    .header { background: #16213e; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #e94560; }
    .header h1 { color: #e94560; font-size: 20px; }
    .nav { display: flex; gap: 6px; }
    .nav a { color: #888; text-decoration: none; padding: 8px 13px; border-radius: 8px; font-size: 13px; transition: all 0.2s; }
    .nav a:hover { background: #1a1a2e; color: white; }
    .nav a.active { background: #e94560; color: white; }

    .container { padding: 25px; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 15px; margin-bottom: 25px; }
    .stat-card { background: #16213e; border-radius: 10px; padding: 18px; border-left: 4px solid #e94560; }
    .stat-card.verde { border-left-color: #4ecca3; }
    .stat-card.rojo  { border-left-color: #ff6b6b; }
    .stat-num { font-size: 26px; font-weight: bold; color: #e94560; }
    .stat-card.verde .stat-num { color: #4ecca3; }
    .stat-card.rojo  .stat-num { color: #ff6b6b; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    /* LAYOUT */
    .main-grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    @media(max-width:900px){ .main-grid { grid-template-columns: 1fr; } }

    /* FORM */
    .form-card { background: #16213e; border-radius: 12px; overflow: hidden; }
    .form-header { background: #0f1628; padding: 14px 18px; border-bottom: 1px solid #2a2a4a; }
    .form-header h3 { color: #e94560; font-size: 15px; }
    .form-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .campo label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
    .campo input, .campo select { width: 100%; padding: 10px 13px; border-radius: 8px; border: 2px solid #2a2a4a; background: #1a1a2e; color: white; font-size: 14px; }
    .campo input:focus, .campo select:focus { outline: none; border-color: #e94560; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-btns { display: flex; gap: 10px; margin-top: 4px; }
    .btn { padding: 11px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
    .btn-primary { background: #e94560; color: white; flex: 1; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: #2a2a4a; color: #aaa; }
    .btn-secondary:hover { background: #3a3a5a; color: white; }

    /* TABLE */
    .table-card { background: #16213e; border-radius: 12px; overflow: hidden; }
    .table-header { background: #0f1628; padding: 14px 18px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .table-header h3 { color: #e94560; font-size: 15px; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .search-input { padding: 8px 13px; border-radius: 8px; border: 2px solid #2a2a4a; background: #1a1a2e; color: white; font-size: 13px; width: 200px; }
    .search-input:focus { outline: none; border-color: #e94560; }
    .filter-tabs { display: flex; }
    .ftab { padding: 7px 12px; font-size: 12px; font-weight: bold; cursor: pointer; background: transparent; color: #888; border: 1px solid #2a2a4a; border-right: none; transition: all 0.2s; }
    .ftab:last-child { border-right: 1px solid #2a2a4a; border-radius: 0 8px 8px 0; }
    .ftab:first-child { border-radius: 8px 0 0 8px; }
    .ftab.active, .ftab:hover { background: #e94560; color: white; border-color: #e94560; }

    table { width: 100%; border-collapse: collapse; }
    thead { background: #0f1628; }
    th { padding: 12px 14px; text-align: left; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px 14px; border-bottom: 1px solid #1a1a2e; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e2240; }

    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge-pendiente { background: rgba(233,69,96,0.15); color: #e94560; border: 1px solid rgba(233,69,96,0.3); }
    .badge-pagado    { background: rgba(78,204,163,0.15); color: #4ecca3; border: 1px solid rgba(78,204,163,0.3); }
    .badge-vencido   { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }

    .monto { font-weight: bold; }
    .monto.pendiente { color: #e94560; }
    .monto.pagado    { color: #4ecca3; }
    .monto.vencido   { color: #ff6b6b; }

    .acciones { display: flex; gap: 6px; }
    .abtn { padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; transition: all 0.2s; }
    .abtn-pagar  { background: rgba(78,204,163,0.15); color: #4ecca3; border: 1px solid rgba(78,204,163,0.3); }
    .abtn-pagar:hover  { background: #4ecca3; color: #1a1a2e; }
    .abtn-edit   { background: rgba(122,179,255,0.15); color: #7ab3ff; border: 1px solid rgba(122,179,255,0.3); }
    .abtn-edit:hover   { background: #7ab3ff; color: #1a1a2e; }
    .abtn-del    { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
    .abtn-del:hover    { background: #ff6b6b; color: white; }

    .empty { text-align: center; padding: 40px; color: #555; }

    /* TOAST */
    #toast { position: fixed; bottom: 25px; right: 25px; background: #4ecca3; color: #1a1a2e; padding: 12px 22px; border-radius: 10px; font-weight: bold; font-size: 14px; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: #e94560; color: white; }
  </style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <h1>🔧 Tlapalería El Mirador</h1>
    <img src="https://1000logos.net/wp-content/uploads/2021/05/Truper-logo.png" alt="Truper"
         style="height:24px;opacity:0.85;filter:brightness(0) invert(1);" onerror="this.style.display='none'">
  </div>
  <nav class="nav">
    <a href="/">🏠 POS</a>
    <a href="/productos">📦 Inventario</a>
    <a href="/proveedores" class="active">🚛 Proveedores</a>
    <a href="/reportes">📊 Reportes</a>
    <a href="/ticket">🧾 Tickets</a>
  </nav>
  <span id="fecha-hoy" style="color:#888;font-size:13px"></span>
</div>

<div class="container">

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Proveedores</div></div>
    <div class="stat-card rojo"><div class="stat-num" id="stat-pendiente">—</div><div class="stat-label">Por Pagar</div></div>
    <div class="stat-card verde"><div class="stat-num" id="stat-pagado">—</div><div class="stat-label">Pagado</div></div>
    <div class="stat-card rojo"><div class="stat-num" id="stat-vencido">—</div><div class="stat-label">Vencidas</div></div>
  </div>

  <div class="main-grid">

    <!-- FORMULARIO -->
    <div class="form-card">
      <div class="form-header"><h3 id="form-title">➕ Nueva Cuenta</h3></div>
      <div class="form-body">
        <input type="hidden" id="edit-id"/>
        <div class="campo"><label>Proveedor</label><input type="text" id="f-proveedor" placeholder="Nombre del proveedor"/></div>
        <div class="campo"><label>Producto / Concepto</label><input type="text" id="f-producto" placeholder="Ej: Clavos, Cemento..."/></div>
        <div class="row2">
          <div class="campo"><label>Monto ($)</label><input type="number" id="f-monto" placeholder="0.00" min="0" step="0.01"/></div>
          <div class="campo"><label>Vencimiento</label><input type="date" id="f-fecha"/></div>
        </div>
        <div class="campo">
          <label>Estado</label>
          <select id="f-estado">
            <option value="Pendiente">Pendiente</option>
            <option value="Pagado">Pagado</option>
          </select>
        </div>
        <div class="campo"><label>Notas (opcional)</label><input type="text" id="f-notas" placeholder="Factura #, observaciones..."/></div>
        <div class="form-btns">
          <button class="btn btn-primary" onclick="guardarProveedor()">💾 Guardar</button>
          <button class="btn btn-secondary" onclick="limpiarForm()">Limpiar</button>
        </div>
      </div>
    </div>

    <!-- TABLA -->
    <div class="table-card">
      <div class="table-header">
        <h3>📋 Registro de Cuentas</h3>
        <div class="toolbar">
          <input class="search-input" type="text" id="buscar" placeholder="🔍 Buscar proveedor..." oninput="renderTabla()"/>
          <div class="filter-tabs">
            <button class="ftab active" onclick="setFiltro('todos',this)">Todos</button>
            <button class="ftab" onclick="setFiltro('Pendiente',this)">Pendiente</button>
            <button class="ftab" onclick="setFiltro('Pagado',this)">Pagado</button>
            <button class="ftab" onclick="setFiltro('Vencido',this)">Vencido</button>
          </div>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Proveedor</th><th>Producto</th><th>Monto</th>
              <th>Vencimiento</th><th>Estado</th><th>Notas</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr><td colspan="8" class="empty">Cargando... ⏳</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  let proveedores = [];
  let filtroActivo = 'todos';

  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-MX', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  async function cargar() {
    try {
      const res = await fetch('/api/proveedores');
      const data = await res.json();
      proveedores = data.proveedores || [];
      renderTabla();
      actualizarStats();
    } catch(e) {
      proveedores = [];
      renderTabla();
    }
  }

  function estadoReal(p) {
    if (p.estado === 'Pagado') return 'Pagado';
    if (p.fecha_vencimiento) {
      const vence = new Date(p.fecha_vencimiento + 'T00:00:00');
      if (vence < new Date()) return 'Vencido';
    }
    return 'Pendiente';
  }

  function actualizarStats() {
    const pendiente = proveedores.filter(p => estadoReal(p) === 'Pendiente');
    const pagado    = proveedores.filter(p => estadoReal(p) === 'Pagado');
    const vencido   = proveedores.filter(p => estadoReal(p) === 'Vencido');
    document.getElementById('stat-total').textContent     = proveedores.length;
    document.getElementById('stat-pendiente').textContent = '$' + pendiente.reduce((s,p) => s + parseFloat(p.monto||0), 0).toFixed(2);
    document.getElementById('stat-pagado').textContent    = '$' + pagado.reduce((s,p) => s + parseFloat(p.monto||0), 0).toFixed(2);
    document.getElementById('stat-vencido').textContent   = vencido.length;
  }

  function renderTabla() {
    const q = document.getElementById('buscar').value.toLowerCase();
    const tbody = document.getElementById('tabla-body');
    const filtrados = proveedores.filter(p => {
      const coincide = (p.proveedor||'').toLowerCase().includes(q) || (p.producto||'').toLowerCase().includes(q);
      const estado = estadoReal(p);
      return coincide && (filtroActivo === 'todos' || estado === filtroActivo);
    });

    if (!filtrados.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty">Sin registros 📭</td></tr>`;
      return;
    }

    tbody.innerHTML = filtrados.map((p, i) => {
      const estado = estadoReal(p);
      const badgeClass = estado === 'Pagado' ? 'badge-pagado' : estado === 'Vencido' ? 'badge-vencido' : 'badge-pendiente';
      const montoClass = estado === 'Pagado' ? 'pagado' : estado === 'Vencido' ? 'vencido' : 'pendiente';
      const fechaStr = p.fecha_vencimiento ? new Date(p.fecha_vencimiento + 'T00:00:00').toLocaleDateString('es-MX') : '—';
      return `
        <tr>
          <td style="color:#555">${i+1}</td>
          <td><strong>${p.proveedor||'—'}</strong></td>
          <td style="color:#888">${p.producto||'—'}</td>
          <td><span class="monto ${montoClass}">$${parseFloat(p.monto||0).toFixed(2)}</span></td>
          <td style="font-size:12px">${fechaStr}</td>
          <td><span class="badge ${badgeClass}">${estado}</span></td>
          <td style="color:#888;font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.notas||'—'}</td>
          <td>
            <div class="acciones">
              ${estado !== 'Pagado' ? `<button class="abtn abtn-pagar" onclick="marcarPagado(${p.id})">✓ Pagar</button>` : ''}
              <button class="abtn abtn-edit" onclick="editarProveedor(${p.id})">✏️</button>
              <button class="abtn abtn-del" onclick="eliminarProveedor(${p.id})">🗑️</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  function setFiltro(f, btn) {
    filtroActivo = f;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTabla();
  }

  async function guardarProveedor() {
    const id = document.getElementById('edit-id').value;
    const payload = {
      proveedor: document.getElementById('f-proveedor').value.trim(),
      producto:  document.getElementById('f-producto').value.trim(),
      monto:     parseFloat(document.getElementById('f-monto').value) || 0,
      fecha_vencimiento: document.getElementById('f-fecha').value,
      estado:    document.getElementById('f-estado').value,
      notas:     document.getElementById('f-notas').value.trim()
    };
    if (!payload.proveedor || !payload.monto) { toast('Proveedor y monto son obligatorios', true); return; }
    const url = id ? `/api/proveedores/${id}` : '/api/proveedores';
    const method = id ? 'PUT' : 'POST';
    try {
      const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      const data = await res.json();
      if (data.error) { toast(data.error, true); return; }
      toast(id ? '✅ Cuenta actualizada' : '✅ Cuenta registrada');
      limpiarForm();
      cargar();
    } catch(e) { toast('Error de conexión', true); }
  }

  async function marcarPagado(id) {
    try {
      await fetch(`/api/proveedores/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({estado:'Pagado'}) });
      toast('✅ Marcado como pagado');
      cargar();
    } catch(e) { toast('Error', true); }
  }

  function editarProveedor(id) {
    const p = proveedores.find(x => x.id === id);
    if (!p) return;
    document.getElementById('edit-id').value      = p.id;
    document.getElementById('f-proveedor').value  = p.proveedor || '';
    document.getElementById('f-producto').value   = p.producto || '';
    document.getElementById('f-monto').value      = p.monto || '';
    document.getElementById('f-fecha').value      = p.fecha_vencimiento || '';
    document.getElementById('f-estado').value     = p.estado || 'Pendiente';
    document.getElementById('f-notas').value      = p.notas || '';
    document.getElementById('form-title').textContent = '✏️ Editar Cuenta';
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  async function eliminarProveedor(id) {
    if (!confirm('¿Eliminar esta cuenta?')) return;
    try {
      await fetch(`/api/proveedores/${id}`, { method: 'DELETE' });
      toast('🗑️ Eliminado');
      cargar();
    } catch(e) { toast('Error', true); }
  }

  function limpiarForm() {
    ['edit-id','f-proveedor','f-producto','f-monto','f-fecha','f-notas'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-estado').value = 'Pendiente';
    document.getElementById('form-title').textContent = '➕ Nueva Cuenta';
  }

  function toast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (error ? ' error' : '');
    setTimeout(() => t.className = '', 3000);
  }

  cargar();
</script>
</body>
</html>
